kind = "web"
previewPath = "/"
title = "Creator Hub"
version = "1.0.0"
id = "creator-hub"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 5173

[services.development]
run = "pnpm --filter @workspace/creator-hub run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/creator-hub", "run", "build" ]
publicDir = "artifacts/creator-hub/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "5173"
BASE_PATH = "/"
